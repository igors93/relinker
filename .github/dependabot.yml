version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "build"
          - "hatchling"

  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    groups:
      build-tools:
        patterns:
          - "build"
          - "twine"
