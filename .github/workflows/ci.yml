name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run lint
        run: python -m ruff check .

      - name: Run type checks
        run: python -m mypy src tests/typing

  tests:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov=relinker --cov-report=term-missing --cov-fail-under=85

  documentation:
    name: Documentation contracts
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run documentation contracts
        run: |
          python -m pytest \
            tests/documentation \
            tests/contracts/test_public_api_contract.py \
            -v

  validate-package:
    name: Validate package
    runs-on: ubuntu-latest
    needs: [tests, documentation]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies for twine
        run: python -m pip install -e ".[dev]"

      - name: Install build backend and tools with pinned hashes
        run: |
          python -m pip install --no-deps --only-binary :all: -r requirements/build-backend.txt
          python -m pip install --no-deps --only-binary :all: -r requirements/build-tools.txt

      - name: Build distribution (no-isolation uses pinned backend)
        run: python -m build --no-isolation

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m pip install dist/*.whl
          python scripts/validate_installed_wheel.py

      - name: Verify py.typed marker
        run: |
          python -c "
          import importlib.resources as ir
          files = {f.name for f in ir.files('relinker').iterdir()}
          assert 'py.typed' in files, f'py.typed missing; found: {files}'
          print('py.typed OK')
          "
