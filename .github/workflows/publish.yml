name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6ss
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Check formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Run type checks
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest --cov=relinker --cov-report=term-missing

      - name: Verify pyproject.toml version matches package version
        run: |
          PYPROJECT_VERSION=$(grep -m1 '^version\s*=' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')
          PACKAGE_VERSION=$(python -c "import relinker; print(relinker.__version__)")
          if [ "$PYPROJECT_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$PYPROJECT_VERSION, package=$PACKAGE_VERSION"
            exit 1
          fi
          echo "Verified version: $PYPROJECT_VERSION"

      - name: Verify py.typed marker is present
        run: |
          python -c "
          import importlib.resources as ir
          files = {f.name for f in ir.files('relinker').iterdir()}
          assert 'py.typed' in files, f'py.typed missing; found: {files}'
          print('py.typed OK')
          "

      - name: Build package
        run: python -m build

      - name: Validate distribution metadata with twine
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m pip install dist/*.whl --force-reinstall
          python -c "import relinker; print('Import OK:', relinker.__version__)"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/project/relinker/

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
