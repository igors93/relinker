name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install build backend and tools with pinned hashes
        run: |
          python -m pip install --no-deps --only-binary :all: -r requirements/build-backend.txt
          python -m pip install --no-deps --only-binary :all: -r requirements/build-tools.txt

      - name: Check formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Run type checks
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest --cov=relinker --cov-report=term-missing

      - name: Validate release version
        run: python scripts/validate_release_version.py --tag "$RELEASE_TAG"

      - name: Verify py.typed marker is present
        run: |
          python -c "
          import importlib.resources as ir
          files = {f.name for f in ir.files('relinker').iterdir()}
          assert 'py.typed' in files, f'py.typed missing; found: {files}'
          print('py.typed OK')
          "

      - name: Build package (no-isolation uses pinned backend)
        run: python -m build --no-isolation

      - name: Validate distribution metadata with twine
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m pip install dist/*.whl --force-reinstall
          python -c "import relinker; print('Import OK:', relinker.__version__)"

      - name: Compute SHA-256 checksums of dist artifacts
        run: |
          sha256sum dist/* | tee dist/SHA256SUMS
          echo "Checksums:"
          cat dist/SHA256SUMS

      - name: Upload distribution artifact with checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    environment:
      name: pypi
      url: https://pypi.org/project/relinker/

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Verify SHA-256 checksums of downloaded artifacts
        run: |
          echo "Verifying checksums..."
          sha256sum --check dist/SHA256SUMS
          echo "All checksums verified OK"

      - name: Remove checksum manifest before publishing
        run: rm dist/SHA256SUMS

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: false
