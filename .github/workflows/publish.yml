name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Check formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Run type checks
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest --cov=relinker --cov-report=term-missing

      - name: Validate release version
        run: python scripts/validate_release_version.py --tag "$RELEASE_TAG"

      - name: Verify py.typed marker is present
        run: |
          python -c "
          import importlib.resources as ir
          files = {f.name for f in ir.files('relinker').iterdir()}
          assert 'py.typed' in files, f'py.typed missing; found: {files}'
          print('py.typed OK')
          "

      - name: Build package
        run: python -m build

      - name: Validate distribution metadata with twine
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m pip install dist/*.whl --force-reinstall
          python -c "import relinker; print('Import OK:', relinker.__version__)"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    environment:
      name: pypi
      url: https://pypi.org/project/relinker/

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
