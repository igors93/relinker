name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. 0.6.1)"
        required: true

permissions:
  contents: read

jobs:
  validate-and-publish:
    name: Validate and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/relinker/

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Check formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Run type checks
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest

      - name: Verify pyproject.toml version matches package version
        run: |
          PYPROJECT_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          PACKAGE_VERSION=$(python -c "import relinker; print(relinker.__version__)")
          if [ "$PYPROJECT_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$PYPROJECT_VERSION, package=$PACKAGE_VERSION"
            exit 1
          fi
          echo "Verified version: $PYPROJECT_VERSION"

      - name: Verify py.typed marker is present
        run: |
          python -c "
          import importlib.resources as ir
          files = {f.name for f in ir.files('relinker').iterdir()}
          assert 'py.typed' in files, f'py.typed missing; found: {files}'
          print('py.typed OK')
          "

      - name: Build package
        run: python -m build

      - name: Validate distribution metadata with twine
        run: python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m pip install dist/*.whl --force-reinstall
          python -c "import relinker; print('Import OK:', relinker.__version__)"

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
